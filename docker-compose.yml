services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-security-guardrails-api:phase1
    working_dir: /workspace
    volumes:
      - .:/workspace
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/llm_guardrails
      APP_REDIS_URL: redis://redis:6379/0
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    command: >
      sh -c "alembic -c alembic/alembic.ini upgrade head &&
      uvicorn backend.app.main:app --host $${APP_HOST:-0.0.0.0} --port $${APP_PORT:-8000}"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_guardrails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_guardrails"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
